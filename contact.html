<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaTech</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <img class="logo" src="./Assets/logo.png">
        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="about.html">About us</a>
            <a href="pricing.html">Services</a>
            <a href="contact.html">Contact</a>
            <button>Get Started</button>
        </nav>
        <button class="burger" id="burger-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>
    <div class="contact-page-headings">
        <h3>GET IN TOUCH</h3>
        <h1>We'd love to hear from you</h1>
    </div>
    
    <div class="input-groups-and-contact-info">
        <div class="contact-inputs">
            <div class="input-box">
                <label for="Full-Name">Full Name</label>
                <input type="text" id="Full-Name">
            </div>

            <div class="input-box">
                <label for="Email-Address">Email Address</label>
                <input type="text" id="Email-Address">
            </div>

             <div class="input-box">
                <label for="Subject">Subject</label>
                <input type="text" id="Subject">
            </div>
            
             <div id="Message-input" class="input-box">
                <label for="Message">Message</label>
                <textarea id="Message" rows="5"></textarea>
            </div>
            <button>Send Message</button>
        </div>
        <div class="contact-info">
        <div class="email-info">
            <p><b>Email us</b></p>
            <a href="hello@novatech.com">hello@novatech.com</a>
        </div>

        <div class="phone-number-info">
            <p><b>Email us</b></p>
            <p>91+ 995 857 3541</p>
        </div>

        <div class="location-info">
            <p><b>Location</b></p>
            <p>Faridabad, India</p>
        </div>
        </div>
    </div>
    
    <footer>
        <img src="./Assets/logo.png" class="logo-in-footer">
        <p class="para-in-footer">We don't just build websites, we build businesses.</p>
        <div class="socials-in-footer">
            <a><i class="fa-brands fa-facebook"></i></a>
            <a><i class="fa-brands fa-square-instagram"></i></a>
            <a><i class="fa-brands fa-twitter"></i></a>
            <a><i class="fa-brands fa-linkedin"></i></a>
        </div>
        <p class="copyright-text">
            <a><i class="fa-regular fa-copyright"></i></a>
            2026 NovaTech. All rights reserved.
        </p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
